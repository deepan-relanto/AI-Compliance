      const viewport = document.getElementById("viewport");
      const canvas = document.getElementById("canvas");
      const svg = document.getElementById("svg");
      const searchEl = document.getElementById("search");
      const zoomBadge = document.getElementById("zoomBadge");
      const urlParams = new URLSearchParams(window.location.search);
      const embedMode = urlParams.get("embed") === "1";
      if (embedMode) document.body.classList.add("embed");

      /* Horizontal (left → right) layout — matches NotebookLM screenshots */
      const NODE_H = 40;
      const NODE_GAP_Y = 18;
      const COLUMN_GAP = 48;
      const H_PAD = 16;
      const CHAR_W = 7.6;
      const TOGGLE_R = 7;
      const TOGGLE_FOOTPRINT = TOGGLE_R * 2 + 12;

      const collapsed = new Map();
      let highlightIds = new Set();
      let pan = { x: 28, y: 24 };
      let zoom = 0.85;
      const MIN_ZOOM = 0.28;
      const MAX_ZOOM = 1.7;

      function measureWidthFor(node, depth) {
        const base = Math.ceil(String(node.label).length * CHAR_W) + H_PAD * 2;
        if (depth === 0) return Math.max(238, base + 16);
        if (depth === 1) return Math.max(170, base);
        if (depth === 2) return Math.max(148, base);
        return Math.max(130, base);
      }

      function nodeExtentRight(width, hasKids) {
        return width + (hasKids ? TOGGLE_FOOTPRINT : 0);
      }

      function hasChildren(node) {
        return Array.isArray(node.children) && node.children.length > 0;
      }

      function isCollapsed(id) {
        return collapsed.get(id) === true;
      }

      function visibleChildren(node) {
        if (!hasChildren(node) || isCollapsed(node.id)) return [];
        return node.children;
      }

      function roleForDepth(depth, node) {
        if (depth === 0) return "root";
        if (depth === 1) return "branch";
        if (hasChildren(node)) return "mid";
        return "leaf";
      }

      function applyTransform() {
        canvas.style.transform = `translate(${pan.x}px, ${pan.y}px) scale(${zoom})`;
        zoomBadge.textContent = `${Math.round(zoom * 100)}%`;
      }

      /** Horizontal tree: x by dynamic column, y by subtree midpoints */
      function layout(root) {
        const positions = new Map();
        const sizes = new Map();
        const maxWidthByDepth = new Map();

        function subtreeHeight(node) {
          const kids = visibleChildren(node);
          if (!kids.length) return NODE_H;
          let h = 0;
          for (let i = 0; i < kids.length; i++) {
            h += subtreeHeight(kids[i]);
            if (i < kids.length - 1) h += NODE_GAP_Y;
          }
          return Math.max(NODE_H, h);
        }

        function measureDepths(node, depth) {
          const width = measureWidthFor(node, depth);
          const extent = nodeExtentRight(width, hasChildren(node));
          maxWidthByDepth.set(
            depth,
            Math.max(maxWidthByDepth.get(depth) || 0, extent),
          );
          for (const child of visibleChildren(node)) {
            measureDepths(child, depth + 1);
          }
        }

        measureDepths(root, 0);

        const columnX = [0];
        const maxDepth = Math.max(...maxWidthByDepth.keys(), 0);
        for (let d = 1; d <= maxDepth; d++) {
          const prevExtent = maxWidthByDepth.get(d - 1) || 0;
          columnX[d] = columnX[d - 1] + prevExtent + COLUMN_GAP;
        }

        function walk(node, depth, yTop) {
          const kids = visibleChildren(node);
          const width = measureWidthFor(node, depth);
          const height = subtreeHeight(node);
          sizes.set(node.id, { w: width, h: NODE_H, depth });

          const x = columnX[depth] ?? depth * 280;
          const y = yTop + height / 2 - NODE_H / 2;
          positions.set(node.id, { x, y });

          if (!kids.length) {
            return { minY: y, maxY: y + NODE_H };
          }

          let cursor = yTop;
          for (let i = 0; i < kids.length; i++) {
            const childH = subtreeHeight(kids[i]);
            walk(kids[i], depth + 1, cursor);
            cursor += childH + NODE_GAP_Y;
          }

          return { minY: yTop, maxY: yTop + height };
        }

        const bounds = walk(root, 0, 0);
        let minX = Infinity;
        let maxX = -Infinity;
        for (const [id, p] of positions) {
          const s = sizes.get(id);
          const extent = nodeExtentRight(s.w, true);
          minX = Math.min(minX, p.x);
          maxX = Math.max(maxX, p.x + extent);
        }
        return {
          positions,
          sizes,
          bounds: {
            minX,
            maxX,
            minY: bounds.minY,
            maxY: bounds.maxY,
          },
        };
      }

      function ensureDefs() {
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

        const rootFill = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
        rootFill.id = "rootFill";
        rootFill.setAttribute("x1", "0%");
        rootFill.setAttribute("y1", "0%");
        rootFill.setAttribute("x2", "100%");
        rootFill.setAttribute("y2", "100%");
        rootFill.innerHTML = `
          <stop offset="0%" stop-color="#2e3192"/>
          <stop offset="55%" stop-color="#3d42a8"/>
          <stop offset="100%" stop-color="#f15a24"/>
        `;

        const linkGradient = document.createElementNS("http://www.w3.org/2000/svg", "linearGradient");
        linkGradient.id = "linkGradient";
        /* userSpaceOnUse avoids zero-height objectBoundingBox failure on flat edges */
        linkGradient.setAttribute("gradientUnits", "userSpaceOnUse");
        linkGradient.setAttribute("x1", "0");
        linkGradient.setAttribute("y1", "0");
        linkGradient.setAttribute("x2", "1200");
        linkGradient.setAttribute("y2", "0");
        linkGradient.innerHTML = `
          <stop offset="0%" stop-color="#2e3192" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#f15a24" stop-opacity="0.45"/>
        `;

        const nodeShadow = document.createElementNS("http://www.w3.org/2000/svg", "filter");
        nodeShadow.id = "nodeShadow";
        nodeShadow.setAttribute("x", "-25%");
        nodeShadow.setAttribute("y", "-35%");
        nodeShadow.setAttribute("width", "150%");
        nodeShadow.setAttribute("height", "190%");
        nodeShadow.innerHTML = `
          <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#18181b" flood-opacity="0.07"/>
        `;

        const arrowEnd = document.createElementNS("http://www.w3.org/2000/svg", "marker");
        arrowEnd.id = "arrowEnd";
        arrowEnd.setAttribute("markerWidth", "8");
        arrowEnd.setAttribute("markerHeight", "8");
        arrowEnd.setAttribute("refX", "7");
        arrowEnd.setAttribute("refY", "4");
        arrowEnd.setAttribute("orient", "auto");
        arrowEnd.setAttribute("markerUnits", "userSpaceOnUse");
        arrowEnd.innerHTML = `
          <path d="M0,0 L8,4 L0,8 Z" fill="#2e3192" fill-opacity="0.95"/>
        `;

        defs.appendChild(rootFill);
        defs.appendChild(linkGradient);
        defs.appendChild(nodeShadow);
        defs.appendChild(arrowEnd);
        svg.appendChild(defs);
      }

      function clearSvg() {
        while (svg.firstChild) svg.removeChild(svg.firstChild);
      }

      function drawCurve(x1, y1, x2, y2) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "link");
        const span = Math.max(1, x2 - x1);
        const dx = Math.min(Math.max(18, span * 0.45), span * 0.55);
        const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
        path.setAttribute("d", d);
        svg.appendChild(path);
      }

      function drawNode(node, pos, size) {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "node");
        g.setAttribute("data-id", node.id);

        const role = roleForDepth(size.depth, node);
        const rx = size.depth === 0 ? 12 : 10;

        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", pos.x);
        rect.setAttribute("y", pos.y);
        rect.setAttribute("width", size.w);
        rect.setAttribute("height", size.h);
        rect.setAttribute("rx", rx);
        rect.setAttribute("ry", rx);
        rect.setAttribute("class", `node-rect ${role}`);
        if (highlightIds.has(node.id)) rect.classList.add("highlight");

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", pos.x + H_PAD);
        label.setAttribute("y", pos.y + size.h / 2 + 4.2);
        label.setAttribute("class", `node-label ${role}`);
        label.textContent = node.label;

        g.appendChild(rect);
        g.appendChild(label);

        if (hasChildren(node)) {
          const cx = pos.x + size.w + TOGGLE_R + 4;
          const cy = pos.y + size.h / 2;
          const open = !isCollapsed(node.id);

          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", cx);
          circle.setAttribute("cy", cy);
          circle.setAttribute("r", TOGGLE_R);
          circle.setAttribute("class", "toggle-fill");

          const chevron = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
          /* NotebookLM uses "<" when expanded (collapse toward parent); ">" when collapsed */
          chevron.setAttribute(
            "points",
            open
              ? `${cx + 2},${cy - 3.5} ${cx - 2},${cy} ${cx + 2},${cy + 3.5}`
              : `${cx - 2},${cy - 3.5} ${cx + 2},${cy} ${cx - 2},${cy + 3.5}`,
          );
          chevron.setAttribute("class", "toggle-chevron");

          g.appendChild(circle);
          g.appendChild(chevron);
        }

        g.addEventListener("click", (e) => {
          e.stopPropagation();
          if (!hasChildren(node)) return;
          collapsed.set(node.id, !isCollapsed(node.id));
          render();
        });

        svg.appendChild(g);
      }

      function renderLinks(node, positions, sizes) {
        const kids = visibleChildren(node);
        const parent = positions.get(node.id);
        const parentSize = sizes.get(node.id);
        if (!parent || !parentSize) return;

        const x1 = parent.x + parentSize.w + (hasChildren(node) ? TOGGLE_R * 2 + 4 : 2);
        const y1 = parent.y + parentSize.h / 2;

        for (const child of kids) {
          const childPos = positions.get(child.id);
          const childSize = sizes.get(child.id);
          if (!childPos || !childSize) continue;
          const x2 = childPos.x - 2;
          const y2 = childPos.y + childSize.h / 2;
          drawCurve(x1, y1, x2, y2);
          renderLinks(child, positions, sizes);
        }
      }

      function renderNodes(node, positions, sizes) {
        const pos = positions.get(node.id);
        const size = sizes.get(node.id);
        if (!pos || !size) return;
        drawNode(node, pos, size);
        for (const child of visibleChildren(node)) {
          renderNodes(child, positions, sizes);
        }
      }

      function render() {
        clearSvg();
        ensureDefs();
        const { positions, sizes, bounds } = layout(MINDMAP_DATA);
        const pad = 56;
        const vbW = Math.max(320, bounds.maxX - bounds.minX + pad * 2);
        const vbH = Math.max(240, bounds.maxY - bounds.minY + pad * 2);
        svg.setAttribute("width", String(vbW));
        svg.setAttribute("height", String(vbH));
        svg.setAttribute(
          "viewBox",
          `${bounds.minX - pad} ${bounds.minY - pad} ${vbW} ${vbH}`,
        );

        renderLinks(MINDMAP_DATA, positions, sizes);
        renderNodes(MINDMAP_DATA, positions, sizes);
      }

      function collectMatches(query) {
        const q = query.trim().toLowerCase();
        const matchIds = new Set();
        const expandIds = new Set();
        if (!q) return { matchIds, expandIds };

        function walk(node, ancestors) {
          const hit = String(node.label).toLowerCase().includes(q);
          const path = ancestors.concat(node.id);
          if (hit) {
            matchIds.add(node.id);
            path.forEach((id) => expandIds.add(id));
          }
          (node.children || []).forEach((child) => walk(child, path));
        }
        walk(MINDMAP_DATA, []);
        return { matchIds, expandIds };
      }

      function applySearch() {
        const { matchIds, expandIds } = collectMatches(searchEl.value || "");
        highlightIds = matchIds;
        if (searchEl.value.trim()) {
          expandIds.forEach((id) => collapsed.set(id, false));
        }
        render();
      }

      function collapseAll() {
        function walk(node) {
          if (hasChildren(node)) collapsed.set(node.id, true);
          (node.children || []).forEach(walk);
        }
        walk(MINDMAP_DATA);
        /* Root open + 6 branches visible; depth-2+ hidden until expanded */
        collapsed.set("root", false);
        (MINDMAP_DATA.children || []).forEach((branch) => {
          collapsed.set(branch.id, true);
        });
        render();
      }

      function expandAll() {
        collapsed.clear();
        render();
      }

      function fitToScreen() {
        const rect = viewport.getBoundingClientRect();
        const mapW = Number(svg.getAttribute("width") || 1200);
        const mapH = Number(svg.getAttribute("height") || 700);
        const nextZoom = Math.min(
          1.05,
          Math.max(0.35, Math.min((rect.width - 40) / mapW, (rect.height - 40) / mapH)),
        );
        zoom = nextZoom;
        pan = {
          x: (rect.width - mapW * zoom) / 2,
          y: Math.max(12, (rect.height - mapH * zoom) / 2),
        };
        applyTransform();
      }

      let dragging = false;
      let dragStart = { x: 0, y: 0 };
      let panStart = { x: 0, y: 0 };

      viewport.addEventListener("pointerdown", (e) => {
        if (e.target.closest("button, input, .node")) return;
        dragging = true;
        viewport.classList.add("dragging");
        viewport.setPointerCapture(e.pointerId);
        dragStart = { x: e.clientX, y: e.clientY };
        panStart = { ...pan };
      });

      viewport.addEventListener("pointermove", (e) => {
        if (!dragging) return;
        pan = {
          x: panStart.x + (e.clientX - dragStart.x),
          y: panStart.y + (e.clientY - dragStart.y),
        };
        applyTransform();
      });

      function endDrag(e) {
        dragging = false;
        viewport.classList.remove("dragging");
        try { viewport.releasePointerCapture(e.pointerId); } catch {}
      }

      viewport.addEventListener("pointerup", endDrag);
      viewport.addEventListener("pointercancel", endDrag);

      viewport.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const rect = viewport.getBoundingClientRect();
          const cx = e.clientX - rect.left;
          const cy = e.clientY - rect.top;
          const oldZoom = zoom;
          const factor = e.deltaY > 0 ? 0.92 : 1.08;
          zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * factor));
          pan = {
            x: pan.x + (1 - zoom / oldZoom) * (cx - pan.x),
            y: pan.y + (1 - zoom / oldZoom) * (cy - pan.y),
          };
          applyTransform();
        },
        { passive: false },
      );

      document.getElementById("resetBtn").addEventListener("click", () => {
        pan = { x: 28, y: 24 };
        zoom = 0.85;
        applyTransform();
      });
      document.getElementById("collapseAllBtn").addEventListener("click", collapseAll);
      document.getElementById("expandAllBtn").addEventListener("click", expandAll);
      document.getElementById("fitBtn").addEventListener("click", fitToScreen);
      searchEl.addEventListener("input", applySearch);

      collapseAll();
      applyTransform();
      requestAnimationFrame(fitToScreen);
    </script>
  </body>
</html>
